name: 🤖 Auto-Blogger Diario — Imperio Público

# ─────────────────────────────────────────────────────────────────────────────
# ESTRUCTURA OFICIAL IMPERIO PÚBLICO — 12 artículos/día · 32 secciones en rotación
# El bot rota por las 32 secciones del portal. Ciclo completo: ~3 días.
# 07:00 AM → Política        07:30 AM → Policía
# 08:00 AM → Deportes        08:30 AM → Tecnología
# 09:00 AM → Sucesos         09:30 AM → Entretenimiento
# 10:00 AM → Economía        10:30 AM → Internacional
# 11:00 AM → Salud           11:30 AM → Cultura
# 12:00 PM → Rotación #11    12:30 PM → Rotación #12
#
# ✅ Los slots fijos cubren las 10 secciones principales siempre.
# ✅ Los slots de rotación cubren las 22 secciones adicionales en orden.
# ✅ Cada job es 100% independiente — un fallo no bloquea los demás.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 11 * * *'    # 07:00 AM RD → Política
    - cron: '30 11 * * *'   # 07:30 AM RD → Policía
    - cron: '0 12 * * *'    # 08:00 AM RD → Deportes
    - cron: '30 12 * * *'   # 08:30 AM RD → Tecnología
    - cron: '0 13 * * *'    # 09:00 AM RD → Sucesos
    - cron: '30 13 * * *'   # 09:30 AM RD → Entretenimiento
    - cron: '0 14 * * *'    # 10:00 AM RD → Tendencias
    - cron: '30 14 * * *'   # 10:30 AM RD → Economía
    - cron: '0 15 * * *'    # 11:00 AM RD → Internacional
    - cron: '30 15 * * *'   # 11:30 AM RD → Salud
    - cron: '0 16 * * *'    # 12:00 PM RD → Cultura
    - cron: '30 16 * * *'   # 12:30 PM RD → Rotación (artículo #12)
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoría a publicar (dejar vacío = auto)'
        required: false
        default: ''

# ─── FUNCIÓN REUTILIZABLE: publica 1 artículo con reintentos ─────────────────
# Cada job es COMPLETAMENTE INDEPENDIENTE — no hay `needs:` entre ellos.
# Si uno falla, los demás siguen corriendo en su horario sin verse afectados.

jobs:
  # ─── 07:00 AM RD — Política ──────────────────────────────────────────────
  politica:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.category == 'politica' || github.event.inputs.category == ''))
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: 🏛️ Publicar — POLÍTICA (intento 1)
        id: intento1
        continue-on-error: true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: "https://www.imperiopublico.com"
        run: |
          echo "🚀 POLÍTICA — intento 1 — $(date -u)"
          HTTP=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            --max-time 90 \
            -X GET "$SITE_URL/api/cron/bot?category=politica" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP: $HTTP — $(cat /tmp/res.json)"
          [ "$HTTP" = "200" ] || exit 1

      - name: 🏛️ Publicar — POLÍTICA (reintento 2 si falló)
        if: steps.intento1.outcome == 'failure'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: "https://www.imperiopublico.com"
        run: |
          echo "🔄 POLÍTICA — reintento 2 — $(date -u)"
          sleep 30
          HTTP=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            --max-time 90 \
            -X GET "$SITE_URL/api/cron/bot?category=politica" \
            -H "Authorization: Bearer $CRON_SECRET")
