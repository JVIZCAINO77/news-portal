name: Auto-Blogger Diario

on:
  schedule:
    # Ejecuta cada 2 horas para máxima frecuencia de publicación
    - cron: '0 */2 * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  publish_article:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Ejecutar Agente Redactor — Todas las categorías
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'pulso-bot-secret-2026' }}
          SITE_URL: "https://www.imperiopublico.com"
        run: |
          CATEGORIES="noticias politica deportes economia sucesos internacional entretenimiento tecnologia salud cultura tendencias policia"
          TOTAL=0
          FAILED=0

          for cat in $CATEGORIES; do
            echo "====================================="
            echo "🚀 Procesando sección: $cat"
            echo "====================================="

            HTTP_STATUS=$(curl \
              --silent \
              --max-time 55 \
              --retry 2 \
              --retry-delay 5 \
              --output /dev/null \
              --write-out "%{http_code}" \
              -X GET "$SITE_URL/api/cron/bot?category=$cat" \
              -H "Authorization: Bearer $CRON_SECRET")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Éxito: $cat (HTTP $HTTP_STATUS)"
              TOTAL=$((TOTAL + 1))
            else
              echo "⚠️ Omitida: $cat (HTTP $HTTP_STATUS)"
              FAILED=$((FAILED + 1))
            fi

            echo "⏳ Pausa 30s antes de la siguiente categoría..."
            sleep 30
          done

          echo ""
          echo "════════════════════════════════"
          echo "📊 RESUMEN: $TOTAL éxitos / $FAILED fallos"
          echo "════════════════════════════════"

      - name: Auto-Reparación de Imágenes
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'pulso-bot-secret-2026' }}
          SITE_URL: "https://www.imperiopublico.com"
        run: |
          echo "⚙️ Iniciando Auto-Reparación de imágenes..."
          RESULT=$(curl -s --max-time 30 \
            -X POST "$SITE_URL/api/admin/repair-images?secret=$CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"limit": 20}')
          echo "📊 Resultado: $RESULT"
