          HTTP=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            --max-time 90 \
            -X GET "$SITE_URL/api/cron/bot" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP: $HTTP — $(cat /tmp/res.json)"
          [ "$HTTP" = "200" ] || exit 1
      - name: 🔄 Publicar — SLOT 12 / Rotación (reintento 2)
        if: steps.intento1.outcome == 'failure'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: "https://www.imperiopublico.com"
        run: |
          sleep 30
          HTTP=$(curl -s -o /tmp/res.json -w "%{http_code}" \
