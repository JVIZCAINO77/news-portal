name: Auto-Blogger Diario

on:
  schedule:
    # Ejecuta el flujo automáticamente cada 3 horas sin excepción para mantener 
    # una publicación dinámica (8 veces al día x 8 categorías).
    - cron: '0 */3 * * *'
  workflow_dispatch: # Permite ejecutar el bot manualmente desde la página de GitHub

jobs:
  publish_article:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar Agente Redactor (Vía API Endpoint para todas las categorías)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'pulso-bot-secret-2026' }}
          NEXT_PUBLIC_SITE_URL: "https://news-portal-rosy-kappa.vercel.app" # Reemplazar si usan otro dominio primario
        run: |
          CATEGORIES="noticias entretenimiento deportes tecnologia economia salud opinion cultura sucesos tendencias internacional politica"
          for cat in $CATEGORIES; do
            echo "====================================="
            echo "🚀 Lanzando Agente Remoto para: $cat"
            echo "====================================="
            
            # Ejecutar CURL contra Vercel en la nube
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" -X GET "$NEXT_PUBLIC_SITE_URL/api/cron/bot?category=$cat" -H "Authorization: Bearer $CRON_SECRET")
            
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "⚠️ Falló la categoría $cat con status $HTTP_STATUS, continuando con la siguiente..."
            else
              echo "✅ Éxito para $cat"
            fi
            
            echo "⏱️ Pausando 65 segundos (anti rate-limit de Google Gemini)..."
            sleep 65
          done
