name: 🤖 Auto-Blogger Diario — Imperio Público

# ─────────────────────────────────────────────────────────────────────────────
# ESTRATEGIA: 1 categoría cada 30 minutos — natural, no agresivo.
# 12 categorías × 30 min = publica de 7:00AM a 12:30PM RD (tarde limpia).
# Cada artículo tiene su espacio propio en Google News y RRSS.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 11 * * *'    # 07:00 AM RD → Noticias Nacionales
    - cron: '30 11 * * *'   # 07:30 AM RD → Política
    - cron: '0 12 * * *'    # 08:00 AM RD → Economía
    - cron: '30 12 * * *'   # 08:30 AM RD → Deportes
    - cron: '0 13 * * *'    # 09:00 AM RD → Sucesos
    - cron: '30 13 * * *'   # 09:30 AM RD → Policía
    - cron: '0 14 * * *'    # 10:00 AM RD → Entretenimiento
    - cron: '30 14 * * *'   # 10:30 AM RD → Cultura
    - cron: '0 15 * * *'    # 11:00 AM RD → Salud
    - cron: '30 15 * * *'   # 11:30 AM RD → Tendencias
    - cron: '0 16 * * *'    # 12:00 PM RD → Tecnología
    - cron: '30 16 * * *'   # 12:30 PM RD → Internacional
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoría a publicar (dejar vacío = todas)'
        required: false
        default: ''

jobs:
  # ─── 07:00 AM RD — Noticias Nacionales ───────────────────────────────────
  noticias:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📰 Publicar — NOTICIAS
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: "https://www.imperiopublico.com"
        run: |
          echo "🚀 Sección: NOTICIAS — $(date -u)"
          HTTP=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            --max-time 58 \
            -X GET "$SITE_URL/api/cron/bot?category=noticias" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP: $HTTP — $(cat /tmp/res.json)"
          [ "$HTTP" = "200" ] || exit 1

  # ─── 07:30 AM RD — Política ──────────────────────────────────────────────
  politica:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🏛️ Publicar — POLÍTICA
