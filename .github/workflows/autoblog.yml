name: 🤖 Auto-Blogger Diario — Imperio Público

# ─────────────────────────────────────────────────────────────────────────────
# ESTRATEGIA: 1 categoría por hora, distribuidas a lo largo del día.
# Elimina el pico de CPU simultáneo que causaba el Fluid Active CPU alto.
# Cada job dura ~30-60s máximo (limitado por maxDuration del bot).
# Plan gratuito de Vercel: NO usa vercel.json/crons — usa GitHub Actions gratis.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 11 * * *'   # 07:00 AM RD (UTC-4) → Noticias Nacionales
    - cron: '0 12 * * *'   # 08:00 AM RD         → Política
    - cron: '0 13 * * *'   # 09:00 AM RD         → Economía
    - cron: '0 14 * * *'   # 10:00 AM RD         → Deportes
    - cron: '0 15 * * *'   # 11:00 AM RD         → Sucesos
    - cron: '0 16 * * *'   # 12:00 PM RD         → Policía
    - cron: '0 17 * * *'   # 01:00 PM RD         → Entretenimiento
    - cron: '0 18 * * *'   # 02:00 PM RD         → Cultura
    - cron: '0 19 * * *'   # 03:00 PM RD         → Salud
    - cron: '0 20 * * *'   # 04:00 PM RD         → Tendencias
    - cron: '0 21 * * *'   # 05:00 PM RD         → Tecnología
    - cron: '0 22 * * *'   # 06:00 PM RD         → Internacional
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoría a publicar (dejar vacío = todas en secuencia)'
        required: false
        default: ''

jobs:
  # ─── 07:00 AM RD — Noticias Nacionales ───────────────────────────────────
  noticias:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📰 Publicar — NOTICIAS
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: "https://www.imperiopublico.com"
        run: |
          echo "🚀 Sección: NOTICIAS — $(date -u)"
          HTTP=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            --max-time 58 \
            -X GET "$SITE_URL/api/cron/bot?category=noticias" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP: $HTTP — $(cat /tmp/res.json)"
          [ "$HTTP" = "200" ] || exit 1

  # ─── 08:00 AM RD — Política ──────────────────────────────────────────────
  politica:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🏛️ Publicar — POLÍTICA
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: "https://www.imperiopublico.com"
